# ========================
# PROFILES
# ========================
spring.profiles.active=localmysql

# Load local secrets (gitignored - không commit file này)
spring.config.import=optional:classpath:application-local.properties

# ========================
# DATASOURCE - MySQL
# ========================
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:zalo_clone}?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:m0tnamk09}
spring.datasource.password=${DB_PASSWORD:1509}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.database=mysql
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate

# ========================
# FLYWAY
# ========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ========================
# HIKARI CONNECTION POOL
# ========================
spring.datasource.hikari.pool-name=ZaloDB-Pool
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
spring.datasource.hikari.data-source-properties.useLocalSessionState=true
spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true
spring.datasource.hikari.data-source-properties.cacheResultSetMetadata=true
spring.datasource.hikari.data-source-properties.cacheServerConfiguration=true
spring.datasource.hikari.data-source-properties.elideSetAutoCommits=true
spring.datasource.hikari.data-source-properties.maintainTimeStats=false

# ========================
# JWT CONFIG
# ========================
app.jwt.secret=zalo-clone-super-secret-key-2025-change-in-production-min32chars
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ========================
# GEMINI AI CONFIG
# ========================
app.gemini.api-key=${GEMINI_API_KEY:}
app.gemini.model=gemini-2.0-flash
app.gemini.max-tokens=1024
app.gemini.context-turns=20

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
app.upload.dir=${UPLOAD_DIR:uploads/}

# ========================
# AWS S3
# ========================
aws.access-key-id=${AWS_ACCESS_KEY_ID:}
aws.secret-access-key=${AWS_SECRET_ACCESS_KEY:}
aws.s3.bucket=${AWS_S3_BUCKET:}
aws.region=${AWS_REGION:ap-southeast-1}

# ========================
# CORS
# ========================
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000,http://localhost:5173,http://localhost:5174,http://localhost:3001,http://localhost:3002,capacitor://localhost,http://localhost

# ========================
# REST
# ========================
spring.data.rest.max-page-size=1000

# ========================
# LOGGING & SQL DEBUG
# ========================
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.com.example.backend=DEBUG
spring.jpa.properties.hibernate.show_sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=${LOG_LEVEL_BIND:trace}

# ========================
# EMAIL (Brevo API)
# ========================
brevo.api.key=${BREVO_API_KEY:your-brevo-api-key}
brevo.sender.email=${BREVO_SENDER_EMAIL:your-email@gmail.com}
brevo.sender.name=${BREVO_SENDER_NAME:Zalo Clone}

# ========================
# SERVER
# ========================
server.port=${PORT:8080}

# ========================
# ACTUATOR
# ========================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never