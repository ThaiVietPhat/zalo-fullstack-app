# ========================
# PROFILES
# ========================
spring.profiles.active=localmysql

# ========================
# DATASOURCE - MySQL
# ========================
spring.datasource.url=jdbc:mysql://localhost:3306/zalo_clone?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&characterEncoding=UTF-8
spring.datasource.username=${DB_USERNAME:m0tnamk09}
spring.datasource.password=${DB_PASSWORD:1509}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.database=mysql
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=validate

# ========================
# FLYWAY
# ========================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true

# ========================
# HIKARI CONNECTION POOL
# ========================
spring.datasource.hikari.pool-name=ZaloDB-Pool
# Chat app có nhi?u concurrent request (WebSocket + REST) ? nên dùng 10-20
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.keepalive-time=60000

# MySQL performance optimizations (gi? nguyên t? config c?)
spring.datasource.hikari.data-source-properties.cachePrepStmts=true
spring.datasource.hikari.data-source-properties.prepStmtCacheSize=250
spring.datasource.hikari.data-source-properties.prepStmtCacheSqlLimit=2048
spring.datasource.hikari.data-source-properties.useServerPrepStmts=true
spring.datasource.hikari.data-source-properties.useLocalSessionState=true
spring.datasource.hikari.data-source-properties.rewriteBatchedStatements=true
spring.datasource.hikari.data-source-properties.cacheResultSetMetadata=true
spring.datasource.hikari.data-source-properties.cacheServerConfiguration=true
spring.datasource.hikari.data-source-properties.elideSetAutoCommits=true
spring.datasource.hikari.data-source-properties.maintainTimeStats=false

# ========================
# KEYCLOAK / OAUTH2
# ========================
spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:your-realm}
spring.security.oauth2.resourceserver.jwt.jwk-set-uri=${KEYCLOAK_URL:http://localhost:8180}/realms/${KEYCLOAK_REALM:your-realm}/protocol/openid-connect/certs

# ========================
# FILE UPLOAD
# ========================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=55MB
app.upload.dir=${UPLOAD_DIR:uploads/}

# ========================
# CORS (??c t? config ? không hardcode trong SecurityConfig)
# ========================
app.cors.allowed-origins=http://localhost:4200,http://localhost:3000,capacitor://localhost,http://localhost

# ========================
# REST
# ========================
spring.data.rest.max-page-size=1000

# ========================
# LOGGING & SQL DEBUG
# ========================
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}
logging.level.com.example.backend=DEBUG
spring.jpa.properties.hibernate.show_sql=${SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.orm.jdbc.bind=${LOG_LEVEL_BIND:trace}

# ========================
# SERVER
# ========================
server.port=${PORT:8080}