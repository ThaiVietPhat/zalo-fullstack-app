# ========================
# TEST PROFILE - H2 in-memory
# ========================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL;NON_KEYWORDS=GROUP,USER,VALUE,KEY
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

spring.flyway.enabled=false

app.jwt.secret=test-secret-key-for-unit-tests-min32chars!!
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

app.cors.allowed-origins=http://localhost:3000
app.upload.dir=uploads/

# ========================
# Spring AI (disabled for tests)
# ========================
spring.ai.openai.api-key=test-dummy-key
spring.ai.openai.base-url=https://api.groq.com/openai
spring.ai.openai.chat.options.model=llama-3.1-8b-instant

# ========================
# Email (Brevo) disabled
# ========================
brevo.api.key=test-dummy-brevo-key
brevo.sender.email=test@test.com
brevo.sender.name=Test

# ========================
# AWS S3 (disabled for tests)
# ========================
aws.access-key-id=test-key
aws.secret-access-key=test-secret
aws.s3.bucket=test-bucket
aws.region=ap-southeast-1

logging.level.com.example.backend=WARN
